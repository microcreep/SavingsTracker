<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Savings Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth glowing effects */
        .glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
        /* Custom scrollbar just to look nice */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-2xl flex flex-col md:flex-row gap-8 items-center">
        
        <div class="flex-1 w-full">
            <h2 class="text-xs font-bold tracking-widest text-emerald-400 uppercase mb-1">Financial Target</h2>
            <h1 class="text-3xl font-extrabold tracking-tight mb-6">Savings Dashboard</h1>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-950/50 p-4 rounded-xl border border-slate-800/60">
                    <span class="text-xs text-slate-400 block mb-1">Current Balance</span>
                    <span id="status-text" class="text-2xl font-bold text-white">£0.00</span>
                </div>
                <div class="bg-slate-950/50 p-4 rounded-xl border border-slate-800/60">
                    <span class="text-xs text-slate-400 block mb-1">Target Goal</span>
                    <span class="text-2xl font-bold text-emerald-400">£4,000</span>
                </div>
            </div>

            <div class="relative w-full bg-slate-950 border border-slate-800 rounded-2xl h-8 overflow-hidden mb-2">
                <div id="my-bar" class="glow bg-gradient-to-r from-emerald-500 via-teal-400 to-cyan-400 h-full w-0 transition-all duration-1500 cubic-bezier(0.4, 0, 0.2, 1) flex items-center justify-end pr-3">
                    <span id="percent-text" class="text-xs font-black text-slate-950 opacity-0 transition-opacity duration-500">0%</span>
                </div>
            </div>
            <p id="days-left" class="text-xs text-slate-400 italic">Tracking live progress updates</p>
        </div>

        <div class="w-full md:w-56 border-t md:border-t-0 md:border-l border-slate-800 pt-6 md:pt-0 md:pl-6">
            <h3 class="text-sm font-bold text-slate-300 mb-4 tracking-wide">Milestones Along the Way</h3>
            
            <div class="space-y-4 relative">
                <div id="milestone-1000" class="flex items-center gap-3 opacity-40 transition-opacity duration-500">
                    <div class="w-2 h-2 rounded-full bg-slate-600 ring-4 ring-slate-900" id="dot-1000"></div>
                    <div>
                        <p class="text-xs font-semibold text-slate-200">£1,000</p>
                        <p class="text-[10px] text-slate-400">Level 1 Complete</p>
                    </div>
                </div>

                <div id="milestone-2000" class="flex items-center gap-3 opacity-40 transition-opacity duration-500">
                    <div class="w-2 h-2 rounded-full bg-slate-600 ring-4 ring-slate-900" id="dot-2000"></div>
                    <div>
                        <p class="text-xs font-semibold text-slate-200">£2,000</p>
                        <p class="text-[10px] text-slate-400">Halfway Mark 🌓</p>
                    </div>
                </div>

                <div id="milestone-3000" class="flex items-center gap-3 opacity-40 transition-opacity duration-500">
                    <div class="w-2 h-2 rounded-full bg-slate-600 ring-4 ring-slate-900" id="dot-3000"></div>
                    <div>
                        <p class="text-xs font-semibold text-slate-200">£3,000</p>
                        <p class="text-[10px] text-slate-400">The Home Stretch</p>
                    </div>
                </div>

                <div id="milestone-4000" class="flex items-center gap-3 opacity-40 transition-opacity duration-500">
                    <div class="w-2 h-2 rounded-full bg-slate-600 ring-4 ring-slate-900" id="dot-4000"></div>
                    <div>
                        <p class="text-xs font-semibold text-slate-200">£4,000</p>
                        <p class="text-[10px] text-slate-400">Ultimate Goal Achieved! 🏆</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function loadSavings() {
            try {
                const response = await fetch('/api/savings');
                const data = await response.json();
                
                const current = data.current;
                const roundedPercentage = Math.min(Math.round(data.progressPercentage), 100);

                // Update text fields
                document.getElementById('status-text').innerText = `£${current.toLocaleString('en-GB', { minimumFractionDigits: 2 })}`;
                
                // Animate progress bar width
                const bar = document.getElementById('my-bar');
                bar.style.width = `${roundedPercentage}%`;

                // Show percentage value inside the bar once it has room
                const percentText = document.getElementById('percent-text');
                if (roundedPercentage > 10) {
                    percentText.innerText = `${roundedPercentage}%`;
                    percentText.classList.remove('opacity-0');
                }

                // Check and highlight milestones based on total cash saved
                handleMilestone(current, 1000);
                handleMilestone(current, 2000);
                handleMilestone(current, 3000);
                handleMilestone(current, 4000);

            } catch (error) {
                document.getElementById('status-text').innerText = "Error";
            }
        }

        function handleMilestone(currentAmount, milestoneTarget) {
            if (currentAmount >= milestoneTarget) {
                const element = document.getElementById(`milestone-${milestoneTarget}`);
                const dot = document.getElementById(`dot-${milestoneTarget}`);
                
                element.classList.remove('opacity-40');
                element.classList.add('opacity-100');
                dot.classList.remove('bg-slate-600');
                dot.classList.add('bg-emerald-400', 'shadow-[0_0_8px_#10b981]');
            }
        }

        loadSavings();
    </script>
</body>
</html>
